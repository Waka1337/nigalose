name: Publish payload

on:
  push:
    branches:
      - main
    paths:
      - payload.zip
      - README.md
      - .github/workflows/publish-payload.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or update v1 release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: v1
        run: |
          set -euo pipefail

          if ! gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG_NAME" \
              --notes "NL launcher payload"
          fi

          gh release upload "$TAG_NAME" payload.zip \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
